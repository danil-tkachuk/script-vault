services:
  - type: web
    name: script-vault
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: script-vault-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.14

databases:
  - name: script-vault-db
    plan: free
